<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#060816"/>
    </linearGradient>

    <radialGradient id="glowA" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
      <animate attributeName="cx" values="38%;62%;38%" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35%;58%;35%" dur="7s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="glowB" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
      <animate attributeName="cx" values="68%;44%;68%" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="62%;40%;62%" dur="8s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="80" y1="100" x2="480" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="420" y1="205" x2="780" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#93c5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <filter id="medBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <path id="packetPath" d="M430 205 C540 112, 664 298, 770 205"/>
    <path id="packetPathBack" d="M770 205 C664 298, 540 112, 430 205"/>
  </defs>

  <style>
    .floatA { animation: floatA 7.5s ease-in-out infinite; transform-origin: center; }
    .floatB { animation: floatB 10s ease-in-out infinite; transform-origin: center; }
    .drift  { animation: drift 16s ease-in-out infinite; transform-origin: center; }
    .pulse  { animation: pulse 2.8s ease-in-out infinite; }
    .pulse2 { animation: pulse2 3.8s ease-in-out infinite; }
    .scan   { animation: scan 4.5s ease-in-out infinite; }
    .dash   { stroke-dasharray: 12 18; animation: dash 6s linear infinite; }
    .line   { animation: lineGlow 2.5s ease-in-out infinite; }
    .packet { animation: packetGlow 1.2s ease-in-out infinite; }

    @keyframes floatA {
      0%,100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-16px) translateX(10px); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(14px) translateX(-8px); }
    }
    @keyframes drift {
      0%,100% { transform: translateX(0px); }
      50% { transform: translateX(16px); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.2; transform: scale(0.95); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    @keyframes pulse2 {
      0%,100% { opacity: 0.18; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.08); }
    }
    @keyframes scan {
      0%,100% { opacity: 0.15; transform: translateY(-10px); }
      50% { opacity: 0.45; transform: translateY(8px); }
    }
    @keyframes dash {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -220; }
    }
    @keyframes lineGlow {
      0%,100% { opacity: 0.18; }
      50% { opacity: 0.42; }
    }
    @keyframes packetGlow {
      0%,100% { opacity: 0.92; }
      50% { opacity: 1; }
    }
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" rx="28" fill="url(#bgBase)"/>
  <circle cx="580" cy="205" r="290" fill="url(#glowA)" class="floatA" filter="url(#softBlur)"/>
  <circle cx="760" cy="195" r="240" fill="url(#glowB)" class="floatB" filter="url(#softBlur)"/>

  <!-- Ambient blobs -->
  <g opacity="0.45" filter="url(#softBlur)" class="drift">
    <ellipse cx="240" cy="92" rx="150" ry="70" fill="#60a5fa" fill-opacity="0.10"/>
    <ellipse cx="980" cy="82" rx="190" ry="85" fill="#93c5fd" fill-opacity="0.08"/>
    <ellipse cx="980" cy="322" rx="170" ry="80" fill="#60a5fa" fill-opacity="0.08"/>
  </g>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200" stroke="#93c5fd" stroke-width="1"/>
    <path d="M100 0V400M260 0V400M420 0V400M580 0V400M740 0V400M900 0V400M1060 0V400" stroke="#93c5fd" stroke-width="1"/>
  </g>

  <!-- Main title area -->
  <g transform="translate(76 98)">
    <text x="0" y="62" font-size="70" font-weight="800" fill="url(#titleGrad)" filter="url(#shadow)">NetStat</text>
    <text x="2" y="108" font-size="24" fill="#cbd5e1" opacity="0.95">Tu scanner de red</text>
    <rect x="0" y="130" width="410" height="3" rx="2" fill="#334155" opacity="0.8"/>
    <rect x="0" y="130" width="150" height="3" rx="2" fill="#93c5fd" class="pulse"/>
  </g>

  <!-- Network line -->
  <path d="M430 205 C540 112, 664 298, 770 205" stroke="url(#lineGrad)" stroke-width="3.5" fill="none" class="dash line"/>
  <path d="M430 205 C540 112, 664 298, 770 205" stroke="#60a5fa" stroke-width="10" fill="none" opacity="0.06" filter="url(#softBlur)"/>

  <!-- Computer 1 -->
  <g transform="translate(500 132) scale(1.02)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="84" rx="10" fill="#111827" stroke="#93c5fd" stroke-width="2"/>
    <rect x="11" y="11" width="98" height="58" rx="6" fill="#08101d" stroke="#1d4ed8" stroke-opacity="0.35"/>
    <rect x="48" y="86" width="24" height="12" rx="2" fill="#374151"/>
    <rect x="29" y="98" width="62" height="7" rx="3" fill="#93c5fd" opacity="0.9"/>
    <path d="M14 23H106" stroke="#60a5fa" stroke-opacity="0.14" stroke-width="2"/>
    <path d="M14 35H106" stroke="#60a5fa" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M14 47H106" stroke="#60a5fa" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="19" y="17" width="82" height="8" rx="4" fill="#93c5fd" opacity="0.18" class="scan"/>
  </g>

  <!-- Computer 2 -->
  <g transform="translate(760 132) scale(1.02)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="84" rx="10" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
    <rect x="11" y="11" width="98" height="58" rx="6" fill="#08101d" stroke="#1d4ed8" stroke-opacity="0.35"/>
    <rect x="48" y="86" width="24" height="12" rx="2" fill="#374151"/>
    <rect x="29" y="98" width="62" height="7" rx="3" fill="#60a5fa" opacity="0.95"/>
    <path d="M14 23H106" stroke="#93c5fd" stroke-opacity="0.14" stroke-width="2"/>
    <path d="M14 35H106" stroke="#93c5fd" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M14 47H106" stroke="#93c5fd" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="19" y="17" width="82" height="8" rx="4" fill="#60a5fa" opacity="0.18" class="scan"/>
  </g>

  <!-- Endpoint halos -->
  <g class="pulse" filter="url(#softBlur)">
    <circle cx="430" cy="205" r="36" fill="#93c5fd" fill-opacity="0.20"/>
    <circle cx="770" cy="205" r="38" fill="#60a5fa" fill-opacity="0.22"/>
  </g>

  <!-- Packets moving along the line -->
  <g filter="url(#glow)">
    <circle r="8" fill="#93c5fd">
      <animateMotion dur="1.55s" repeatCount="indefinite" path="M430 205 C540 112, 664 298, 770 205"/>
    </circle>
    <circle r="7" fill="#60a5fa">
      <animateMotion dur="1.85s" repeatCount="indefinite" path="M770 205 C664 298, 540 112, 430 205"/>
    </circle>
    <circle r="5" fill="#dbeafe" opacity="0.95">
      <animateMotion dur="2.1s" repeatCount="indefinite" path="M430 205 C540 112, 664 298, 770 205"/>
    </circle>
    <circle r="5" fill="#93c5fd" opacity="0.95">
      <animateMotion dur="2.35s" repeatCount="indefinite" path="M770 205 C664 298, 540 112, 430 205"/>
    </circle>
  </g>

  <!-- Packet trails for more presence -->
  <g opacity="0.9">
    <circle cx="430" cy="205" r="16" fill="#93c5fd" fill-opacity="0.10" class="pulse" filter="url(#softBlur)">
      <animateMotion dur="1.55s" repeatCount="indefinite" path="M430 205 C540 112, 664 298, 770 205"/>
    </circle>
    <circle cx="770" cy="205" r="14" fill="#60a5fa" fill-opacity="0.10" class="pulse2" filter="url(#softBlur)">
      <animateMotion dur="1.85s" repeatCount="indefinite" path="M770 205 C664 298, 540 112, 430 205"/>
    </circle>
  </g>

  <!-- Floating packets near computers -->
  <g filter="url(#glow)">
    <circle cx="0" cy="0" r="4" fill="#93c5fd" opacity="0.95">
      <animateMotion dur="4.5s" begin="0s" repeatCount="indefinite" path="M484 161 C520 144, 531 140, 560 155"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#60a5fa" opacity="0.95">
      <animateMotion dur="4.3s" begin="1.1s" repeatCount="indefinite" path="M720 248 C694 266, 676 268, 640 252"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#dbeafe" opacity="0.85">
      <animateMotion dur="5.1s" begin="0.8s" repeatCount="indefinite" path="M490 245 C525 258, 548 262, 592 244"/>
    </circle>
  </g>

  <!-- Small status chips -->
  <g transform="translate(76 300)" class="floatA">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
    <circle cx="20" cy="16" r="5" fill="#60a5fa" class="pulse"/>
    <text x="70" y="21" text-anchor="middle" font-size="14" fill="#cbd5e1">LIVE SCAN</text>
  </g>

  <g transform="translate(214 300)" class="floatB">
    <rect x="0" y="0" width="132" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
    <circle cx="20" cy="16" r="5" fill="#93c5fd" class="pulse2"/>
    <text x="76" y="21" text-anchor="middle" font-size="14" fill="#cbd5e1">DATA FLOW</text>
  </g>

  <!-- Light particles -->
  <g opacity="0.75" filter="url(#glow)">
    <circle cx="182" cy="96" r="2.8" fill="#93c5fd" class="pulse"/>
    <circle cx="1022" cy="86" r="2.5" fill="#60a5fa" class="pulse2"/>
    <circle cx="1042" cy="316" r="3" fill="#93c5fd" class="pulse"/>
    <circle cx="940" cy="50" r="2.2" fill="#dbeafe" class="pulse2"/>
    <circle cx="318" cy="56" r="2.4" fill="#93c5fd" class="pulse"/>
  </g>
</svg>
