<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Importación de la fuente Outfit para un look tech/software premium -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&amp;display=swap');

      .banner-title {
        font-family: 'Outfit', sans-serif;
        font-size: 80px;
        font-weight: 800;
        fill: #FFFFFF;
        letter-spacing: -1px;
      }
      .banner-subtitle {
        font-family: 'Outfit', sans-serif;
        font-size: 20px;
        font-weight: 300;
        fill: #94A3B8;
        letter-spacing: 1px;
      }

      /* --- ANIMACIONES DE RED Y TRANSMISIÓN --- */
      
      /* Brillo ambiental dinámico de fondo */
      @keyframes glowMovement {
        0% { cx: 40%; cy: 30%; r: 50%; }
        50% { cx: 75%; cy: 65%; r: 65%; }
        100% { cx: 40%; cy: 30%; r: 50%; }
      }
      .ambient-glow { animation: glowMovement 12s ease-in-out infinite; }

      /* Ondas del escáner (Radar de Latencia) */
      @keyframes radarPulse {
        0% { r: 10; opacity: 0; }
        10% { opacity: 0.5; }
        100% { r: 180; opacity: 0; }
      }
      .radar-wave-1 { animation: radarPulse 4s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; }
      .radar-wave-2 { animation: radarPulse 4s cubic-bezier(0.215, 0.610, 0.355, 1) infinite 2s; }

      /* Animación sutil para las pantallas encendidas */
      @keyframes screenGlow {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(96, 165, 250, 0.5)); }
        50% { filter: drop-shadow(0 0 14px rgba(147, 197, 253, 0.8)); }
      }
      .pc-screen-glow { animation: screenGlow 4s ease-in-out infinite; }
      .pc-screen-glow-green { animation: screenGlow 3.5s ease-in-out infinite 1s; }

      /* Líneas de datos */
      @keyframes lineFlicker {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.4; }
      }
      .data-link { animation: lineFlicker 5s ease-in-out infinite; }

      /* --- ANIMACIÓN REALISTA DE ESCANEO --- */
      @keyframes loadBar {
        0% { width: 0px; }
        70%, 100% { width: 450px; }
      }
      @keyframes loadDot {
        0% { cx: 0px; }
        70%, 100% { cx: 450px; }
      }
      .animated-progress-bar { animation: loadBar 6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .animated-progress-dot { animation: loadDot 6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

      /* Animación secuencial para los puntos suspensivos */
      @keyframes dotAlpha {
        0%, 20%, 100% { opacity: 0; }
        40%, 80% { opacity: 1; }
      }
      .dot-1 { animation: dotAlpha 1.5s infinite; }
      .dot-2 { animation: dotAlpha 1.5s infinite 0.3s; }
      .dot-3 { animation: dotAlpha 1.5s infinite 0.6s; }
    </style>

    <!-- Filtro de resplandor para los paquetes de datos (Neon) -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradiente del fondo profundo espacial/red -->
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="50%" stop-color="#0A1128" />
      <stop offset="100%" stop-color="#111A36" />
    </linearGradient>

    <!-- Gradiente para el brillo ambiental -->
    <radialGradient id="blur-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#1D4ED8" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#050814" stop-opacity="0" />
    </radialGradient>

    <!-- Gradiente para la barra de progreso -->
    <linearGradient id="tech-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>

  <!-- Base del Lienzo -->
  <rect width="1200" height="400" fill="url(#bg-dark)" />

  <!-- Capa de Luz Dinámica de fondo -->
  <circle cx="50%" cy="50%" r="60%" fill="url(#blur-glow)" class="ambient-glow" />

  <!-- ================= SISTEMA DE RADAR / ESCÁNER ================= -->
  <g transform="translate(680, 190)" fill="none" stroke="#60A5FA" stroke-width="1.25">
    <circle cx="0" cy="0" r="10" class="radar-wave-1" />
    <circle cx="0" cy="0" r="10" class="radar-wave-2" />
    <circle cx="0" cy="0" r="80" stroke="#1E293B" stroke-dasharray="4 4" opacity="0.5" />
    <circle cx="0" cy="0" r="160" stroke="#1E293B" opacity="0.2" />
  </g>

  <!-- Rutas de transmisión de IPs -->
  <g fill="none" stroke-width="1.5" class="data-link">
    <path id="path-to-pc1" d="M 725,190 C 800,100 880,100 955,140" stroke="#3B82F6" stroke-dasharray="5 5" />
    <path id="path-to-pc2" d="M 725,190 C 780,260 860,290 955,270" stroke="#60A5FA" />
  </g>

  <!-- ================= PAQUETES DE DATOS TRANSMITIÉNDOSE ================= -->
  <circle r="4.5" fill="#60A5FA" filter="url(#neon-glow)">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#path-to-pc1" />
    </animateMotion>
  </circle>

  <circle r="4" fill="#34D399" filter="url(#neon-glow)">
    <animateMotion dur="1.7s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1">
      <mpath href="#path-to-pc2" />
    </animateMotion>
  </circle>

  <!-- ================= COMPUTADORAS SUBRED ================= -->

  <!-- 1. COMPUTER IZQUIERDA -->
  <g transform="translate(640, 150)">
    <path d="M 32,65 L 48,65 L 53,78 L 27,78 Z" fill="#334155" />
    <rect x="37" y="58" width="6" height="10" fill="#475569" />
    <rect x="0" y="0" width="80" height="58" rx="5" fill="#1E293B" stroke="#60A5FA" stroke-width="1.5" />
    <rect x="4" y="4" width="72" height="50" rx="2" fill="#060B18" class="pc-screen-glow" />
    <path d="M 12,42 L 28,25 L 44,35 L 60,15" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.8" />
    <circle cx="60" cy="15" r="2" fill="#34D399" />
    <text x="40" y="-12" font-family="'Outfit', sans-serif" font-size="11" fill="#64748B" text-anchor="middle" font-weight="600">192.168.0.1</text>
  </g>

  <!-- 2. COMPUTER DERECHA SUPERIOR -->
  <g transform="translate(950, 105)">
    <path d="M 28,57 L 42,57 L 46,68 L 24,68 Z" fill="#334155" />
    <rect x="32" y="52" width="6" height="7" fill="#475569" />
    <rect x="0" y="0" width="70" height="52" rx="4" fill="#1E293B" stroke="#34D399" stroke-width="1.5" />
    <rect x="4" y="4" width="62" height="44" rx="2" fill="#060B18" class="pc-screen-glow-green" />
    <circle cx="35" cy="26" r="6" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.5" />
    <circle cx="35" cy="26" r="2" fill="#34D399" />
    <text x="35" y="-12" font-family="'Outfit', sans-serif" font-size="11" fill="#64748B" text-anchor="middle">192.168.0.45</text>
    <text x="78" y="28" font-family="'Outfit', sans-serif" font-size="10" fill="#34D399" font-weight="600">12ms</text>
  </g>

  <!-- 3. COMPUTER DERECHA INFERIOR -->
  <g transform="translate(950, 235)">
    <path d="M 28,57 L 42,57 L 46,68 L 24,68 Z" fill="#334155" />
    <rect x="32" y="52" width="6" height="7" fill="#475569" />
    <rect x="0" y="0" width="70" height="52" rx="4" fill="#1E293B" stroke="#3B82F6" stroke-width="1.25" opacity="0.8" />
    <rect x="4" y="4" width="62" height="44" rx="2" fill="#060B18" />
    <line x1="12" y1="18" x2="35" y2="18" stroke="#3B82F6" stroke-width="2" opacity="0.7" />
    <line x1="12" y1="26" x2="48" y2="26" stroke="#3B82F6" stroke-width="2" opacity="0.7" />
    <line x1="12" y1="34" x2="25" y2="34" stroke="#60A5FA" stroke-width="2" opacity="0.9" />
    <text x="35" y="-12" font-family="'Outfit', sans-serif" font-size="11" fill="#64748B" text-anchor="middle">192.168.0.102</text>
    <text x="78" y="28" font-family="'Outfit', sans-serif" font-size="10" fill="#60A5FA" font-weight="600">24ms</text>
  </g>

  <!-- ================= CONFIGURACIÓN DE TEXTOS Y MARCA ================= -->
  <g transform="translate(90, 0)">
    <text x="0" y="175" class="banner-title">NetStat</text>
    <text x="0" y="215" class="banner-subtitle">Escanea, analizá y entendé tu red en segundos</text>

    <!-- Barra de progreso con Escaneo Continuo -->
    <g transform="translate(0, 245)">
      <!-- Fondo contenedor estático -->
      <rect x="0" y="0" width="450" height="4" rx="2" fill="#1E293B" />
      
      <!-- Carga dinámica -->
      <rect x="0" y="0" width="0" height="4" rx="2" fill="url(#tech-gradient)" class="animated-progress-bar" />
      <circle cx="0" cy="2" r="4" fill="#34D399" filter="url(#neon-glow)" class="animated-progress-dot" />
      
      <!-- Texto de carga con puntos suspensivos animados secuencialmente -->
      <text x="450" y="-10" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#34D399" text-anchor="end" letter-spacing="0.5px">
        ESCANEANDO<tspan class="dot-1">.</tspan><tspan class="dot-2">.</tspan><tspan class="dot-3">.</tspan>
      </text>
    </g>
  </g>

</svg>
