<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0b1b3a" />
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)" />

  <!-- Network nodes -->
  <g opacity="0.4">
    <circle cx="150" cy="120" r="4" fill="#00f2ff" />
    <circle cx="350" cy="220" r="4" fill="#00f2ff" />
    <circle cx="550" cy="100" r="4" fill="#00f2ff" />
    <circle cx="750" cy="240" r="4" fill="#00f2ff" />
    <circle cx="950" cy="140" r="4" fill="#00f2ff" />
    <circle cx="1100" cy="260" r="4" fill="#00f2ff" />

    <!-- connections -->
    <path id="p1" d="M150 120 L350 220 L550 100" stroke="#00f2ff" opacity="0.25" fill="none" />
    <path id="p2" d="M550 100 L750 240 L950 140" stroke="#00f2ff" opacity="0.25" fill="none" />
    <path id="p3" d="M350 220 L750 240 L1100 260" stroke="#00f2ff" opacity="0.25" fill="none" />
  </g>

  <!-- PACKETS MOVING -->
  <circle r="5" fill="#00f2ff">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#p1" />
    </animateMotion>
  </circle>

  <circle r="5" fill="#6366f1">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#p2" />
    </animateMotion>
  </circle>

  <circle r="5" fill="#00f2ff">
    <animateMotion dur="3.5s" repeatCount="indefinite">
      <mpath href="#p3" />
    </animateMotion>
  </circle>

  <!-- Title -->
  <text x="80" y="180" font-size="72" font-family="Arial" fill="url(#accent)" filter="url(#glow)" font-weight="bold">
    NetStat
  </text>

  <!-- Subtitle -->
  <text x="85" y="230" font-size="24" font-family="Arial" fill="#cbd5e1">
    Network Scanner • Packet Flow Visualization
  </text>

  <!-- Pulse line -->
  <rect x="85" y="250" width="420" height="4" fill="url(#accent)" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </rect>

</svg>
 
